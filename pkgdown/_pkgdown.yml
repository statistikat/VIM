development:
  mode: unreleased

url: https://statistikat.github.io/VIM/

template:
  params:
    bootswatch: cosmo

reference:
- title: Imputation methods
  desc: Functions to impute missing data
  contents:
  - has_concept("imputation methods")
  - initialise
  - maxCat
  - sampleCat
  - medianSamp
  - imputeCellMM
  - imputeCellReg
- title: Multiple imputation objects
  desc: Helpers for working with vimmi multiple-imputation objects
  contents:
  - complete
  - complete.vimmi
  - with.vimmi
  - as.mids.vimmi
- title: Plotting functions
  desc: Functions to visualize missing and imputed values. See [the visualization vignette](http://statistikat.github.io/VIM/articles/VisualImp.html) for an overview.
  contents:
  - has_concept("plotting functions")
  - colSequence
  - rugNA
  - alphablend
- title: Maps
  contents:
  - colormapMiss
  - mapMiss
  - bgmap
  - growdotMiss
- title: Datasets
  desc: Datasets to showcase several functionalities of VIM.
  contents: has_keyword("datasets")
- title: Other
  contents:
  - VIM-package
  - countInf
  - evaluation
  - gowerD
  - prepare
  - gapMiss
  - tableMiss
  - cellWeightsMCD
